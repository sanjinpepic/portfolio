<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanjin's Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="menu-bar" role="banner">
      <div class="menu-left" role="menubar" aria-label="Desktop menu">
        <span class="apple"></span>
        <div class="menu-group" role="none">
          <button
            id="menu-button-file"
            class="menu-item"
            data-menu="file-menu"
            role="menuitem"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="file-menu"
          >
            File
          </button>
          <ul id="file-menu" class="menu-dropdown" role="menu" aria-labelledby="menu-button-file">
            <li role="none"><button role="menuitem" tabindex="-1" data-action="open-about">Open About</button></li>
            <li role="none"><button role="menuitem" tabindex="-1" data-action="open-projects">Open Projects</button></li>
            <li role="none"><button role="menuitem" tabindex="-1" data-action="open-browser">Open Browser</button></li>
            <li role="none"><button role="menuitem" tabindex="-1" data-action="open-resume">Open Resume</button></li>
            <li role="none"><button role="menuitem" tabindex="-1" data-action="open-contact">Open Contact</button></li>
            <li role="none"><button role="menuitem" tabindex="-1" data-action="close-focused">Close Focused (X)</button></li>
          </ul>
        </div>
        <div class="menu-group" role="none">
          <button
            id="menu-button-view"
            class="menu-item"
            data-menu="view-menu"
            role="menuitem"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="view-menu"
          >
            View
          </button>
          <ul id="view-menu" class="menu-dropdown" role="menu" aria-labelledby="menu-button-view">
            <li role="none"><button role="menuitem" tabindex="-1" data-action="open-all">Open All Windows</button></li>
            <li role="none"><button role="menuitem" tabindex="-1" data-action="close-all">Close All Windows</button></li>
          </ul>
        </div>
        <div class="menu-group" role="none">
          <button
            id="menu-button-special"
            class="menu-item"
            data-menu="special-menu"
            role="menuitem"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="special-menu"
          >
            Special
          </button>
          <ul id="special-menu" class="menu-dropdown" role="menu" aria-labelledby="menu-button-special">
            <li role="none"><button role="menuitem" tabindex="-1" data-action="cascade">Cascade Windows</button></li>
            <li role="none"><button role="menuitem" tabindex="-1" data-action="toggle-theme">Toggle Dark Desktop</button></li>
          </ul>
        </div>
      </div>
      <div class="menu-right" id="clock" aria-live="polite"></div>
    </div>

    <main id="desktop" class="desktop desktop-shell" aria-label="Retro portfolio desktop">
      <button class="desktop-icon" data-open="about-window" style="--x: 3rem; --y: 4.5rem">
        <span class="icon" aria-hidden="true"><img class="icon-image" src="https://gitlab.com/metsatron/BeOS-r5-Icons/-/raw/master/apps/128/BeOS_people.png" alt="" /></span>
        <span class="label">About Me</span>
      </button>
      <button class="desktop-icon" data-open="projects-window" style="--x: 3rem; --y: 12.5rem">
        <span class="icon" aria-hidden="true"><img class="icon-image" src="https://gitlab.com/metsatron/BeOS-r5-Icons/-/raw/master/apps/128/BeOS_folder_documents.png" alt="" /></span>
        <span class="label">Projects</span>
      </button>
      <button class="desktop-icon" data-open="browser-window" style="--x: 3rem; --y: 20.5rem">
        <span class="icon" aria-hidden="true"><img class="icon-image" src="https://gitlab.com/metsatron/BeOS-r5-Icons/-/raw/master/apps/128/surfing_BeOS_browser_netpositive.png" alt="" /></span>
        <span class="label">Browser</span>
      </button>
      <button class="desktop-icon" data-open="resume-window" style="--x: 3rem; --y: 28.5rem">
        <span class="icon" aria-hidden="true"><img class="icon-image" src="https://gitlab.com/metsatron/BeOS-r5-Icons/-/raw/master/apps/128/BeOS_text.png" alt="" /></span>
        <span class="label">Resume</span>
      </button>
      <button class="desktop-icon" data-open="contact-window" style="--x: 3rem; --y: 36.5rem">
        <span class="icon" aria-hidden="true"><img class="icon-image" src="https://gitlab.com/metsatron/BeOS-r5-Icons/-/raw/master/apps/128/BeOS_email.png" alt="" /></span>
        <span class="label">Contact</span>
      </button>

      <section
        id="about-window"
        class="window"
        style="--left: 18rem; --top: 6rem; --width: 26rem"
        aria-labelledby="about-title"
      >
        <header class="title-bar drag-handle">
          <h2 id="about-title">About Me</h2>
          <button class="close-btn" data-close="about-window" aria-label="Close About Me">×</button>
        </header>
        <div class="window-content" data-window-src="windows/about.html"></div>
      </section>

      <section
        id="projects-window"
        class="window"
        style="--left: 31rem; --top: 9rem; --width: 32rem"
        aria-labelledby="projects-title"
      >
        <header class="title-bar drag-handle">
          <h2 id="projects-title">Projects Folder</h2>
          <button class="close-btn" data-close="projects-window" aria-label="Close Projects">×</button>
        </header>
        <div class="window-content" data-window-src="windows/projects.html"></div>
      </section>

      <section
        id="browser-window"
        class="window"
        style="--left: 6rem; --top: 4rem; --width: 78rem; --height: 38rem"
        aria-labelledby="browser-title"
      >
        <header class="title-bar drag-handle">
          <h2 id="browser-title">Netscape Navigator</h2>
          <button class="close-btn" data-close="browser-window" aria-label="Close Browser">×</button>
        </header>
        <div class="window-content browser-content" data-window-src="windows/browser.html"></div>
      </section>

      <section
        id="resume-window"
        class="window"
        style="--left: 20rem; --top: 8rem; --width: 48rem; --height: 34rem"
        aria-labelledby="resume-title"
      >
        <header class="title-bar drag-handle">
          <h2 id="resume-title">Sanjin_Pepic_CV.txt</h2>
          <button class="close-btn" data-close="resume-window" aria-label="Close Resume">×</button>
        </header>
        <div class="window-content resume-content" data-window-src="windows/resume.html"></div>
      </section>

      <section
        id="contact-window"
        class="window"
        style="--left: 38rem; --top: 18rem; --width: 24rem"
        aria-labelledby="contact-title"
      >
        <header class="title-bar drag-handle">
          <h2 id="contact-title">Contact Panel</h2>
          <button class="close-btn" data-close="contact-window" aria-label="Close Contact">×</button>
        </header>
        <div class="window-content" data-window-src="windows/contact.html"></div>
      </section>
    </main>

    <script src="apps/metalcore.js"></script>
    <script src="apps/pixel-runner.js"></script>
    <script src="script.js"></script>
    <script src="apps/github-repos.js"></script>
  </body>
</html>
