<div class="dashboard-shell">
  <section class="dashboard-facts" aria-labelledby="dashboard-facts-heading">
    <div class="dashboard-section-head">
      <h3 id="dashboard-facts-heading">Live internet facts</h3>
      <button type="button" class="dashboard-refresh" id="dashboard-refresh-facts">Refresh</button>
    </div>
    <ul class="fact-list" id="dashboard-fact-list" aria-live="polite">
      <li class="fact-item fact-item--loading">Loading latest fact...</li>
    </ul>
  </section>

  <section class="dashboard-pizza" aria-labelledby="pizza-forecast-heading">
    <h3 id="pizza-forecast-heading">Global pizza forecast</h3>
    <canvas
      class="pizza-chart"
      id="pizza-forecast-chart"
      width="760"
      height="220"
      aria-label="Projected global pizza consumption per month"
    ></canvas>
  </section>
</div>
