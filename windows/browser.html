<div class="browser-menubar" aria-hidden="true">
  <span>File</span><span>Edit</span><span>View</span><span>Go</span><span>Communicator</span><span>Help</span>
</div>
<div class="browser-chrome" role="group" aria-label="Navigation toolbar">
  <div class="browser-nav-buttons">
    <button id="browser-back" class="browser-nav-btn" type="button"><span class="nav-icon">◀</span><span class="nav-label">Back</span></button>
    <button id="browser-forward" class="browser-nav-btn" type="button"><span class="nav-icon">▶</span><span class="nav-label">Fwd</span></button>
    <button id="browser-reload" class="browser-nav-btn" type="button"><span class="nav-icon">↺</span><span class="nav-label">Reload</span></button>
    <button id="browser-home" class="browser-nav-btn" type="button"><span class="nav-icon">⌂</span><span class="nav-label">Home</span></button>
    <button id="browser-stop" class="browser-nav-btn" type="button"><span class="nav-icon">✕</span><span class="nav-label">Stop</span></button>
  </div>
  <div class="browser-throbber" id="browser-throbber" aria-label="Loading indicator">N</div>
</div>
<div class="browser-location-bar">
  <label for="browser-url" class="browser-label">Location:</label>
  <input id="browser-url" class="browser-address" type="text" value="about:blank" readonly />
</div>
<iframe id="browser-frame" class="retro-browser-frame" src="about:blank" title="Retro Browser Content" loading="lazy"></iframe>
<div class="browser-status-bar">
  <span class="browser-security-icon" aria-hidden="true">🔓</span>
  <span id="browser-status">Document: Done</span>
  <span class="browser-brand">Netscape Navigator 4.0</span>
</div>
<p class="resume-note">If the embedded site blocks iframes, use the “Open in new tab” link from Projects.</p>
