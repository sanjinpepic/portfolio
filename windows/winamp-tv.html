<div class="winamp-shell">
  <div class="winamp-now-playing-panel">
    <div class="winamp-main-deck">
      <div class="winamp-display-stack">
        <div class="winamp-lcd-panel">
          <div class="winamp-led-readout" aria-hidden="true">
            <span id="winamp-led-track" class="winamp-led-track">01</span>
            <span id="winamp-led-time" class="winamp-led-time">--:--</span>
          </div>
          <div class="winamp-track-strip">
            <div class="winamp-meta-block">
              <span class="winamp-meta-label">TRACK</span>
              <span id="winamp-track-title" class="winamp-meta-value">Loading lineup...</span>
            </div>
          </div>
          <div class="winamp-meta-grid">
            <div class="winamp-meta-block">
              <span class="winamp-meta-label">BITRATE</span>
              <span class="winamp-meta-value">128 kbps</span>
            </div>
            <div class="winamp-meta-block">
              <span class="winamp-meta-label">MODE</span>
              <span id="winamp-mode-label" class="winamp-meta-value">Video</span>
            </div>
          </div>
        </div>

        <div class="winamp-screen-wrap" id="winamp-screen-wrap" data-visual-mode="video">
          <div id="winamp-youtube-player" class="winamp-player" aria-label="Winamp style music video player"></div>
          <canvas id="winamp-visualizer" class="winamp-visualizer" aria-label="Retro music visualizer"></canvas>
          <div class="winamp-crt-overlay" aria-hidden="true"></div>
          <div class="winamp-screen-door" aria-hidden="true"></div>
        </div>
      </div>

      <div class="winamp-transport">
        <div class="winamp-controls winamp-controls--transport">
          <button type="button" class="winamp-metal-btn" id="winamp-prev">|&lt;&lt;</button>
          <button type="button" class="winamp-metal-btn" id="winamp-toggle">Play</button>
          <button type="button" class="winamp-metal-btn" id="winamp-next">&gt;&gt;|</button>
          <button type="button" class="winamp-metal-btn winamp-metal-btn--wide" id="winamp-mute-toggle">Muted</button>
        </div>

        <div class="winamp-controls winamp-controls--secondary">
          <label class="winamp-volume-label" for="winamp-volume">Volume</label>
          <input id="winamp-volume" type="range" min="0" max="100" value="0" step="1" />
          <button type="button" class="winamp-metal-btn winamp-metal-btn--small" id="winamp-shuffle">Shuffle</button>
          <button type="button" class="winamp-metal-btn winamp-metal-btn--mode" id="winamp-visual-mode-toggle" aria-pressed="false">Visualizer</button>
        </div>
      </div>
    </div>
  </div>

  <aside class="winamp-playlist-panel" aria-label="Playlist">
    <div class="winamp-playlist-head">
      <p class="winamp-playlist-heading">Winamp TV Library</p>
      <div class="winamp-tab-row" role="tablist" aria-label="Winamp library sections">
        <button type="button" class="winamp-tab-btn active" id="winamp-tab-playlist" data-winamp-tab="playlist" role="tab" aria-selected="true">Playlist</button>
        <button type="button" class="winamp-tab-btn" id="winamp-tab-search" data-winamp-tab="search" role="tab" aria-selected="false">Search</button>
      </div>
    </div>
    <div class="winamp-library-panel">
      <div class="winamp-library-view active" id="winamp-playlist-view" data-winamp-view="playlist">
        <div id="winamp-channel-list" class="winamp-channel-list" role="listbox" aria-label="Video channels"></div>
      </div>
      <div class="winamp-library-view" id="winamp-search-view" data-winamp-view="search" hidden>
        <label class="winamp-search-label" for="winamp-search-input">Search or paste a YouTube link</label>
        <input id="winamp-search-input" class="winamp-search-input" type="search" placeholder="Search current lineup or paste a YouTube URL / video id" autocomplete="off" />
        <p class="winamp-search-note">Search filters the current YouTube lineup. Pasting a full YouTube URL or 11-character video id opens it directly.</p>
        <div id="winamp-search-results" class="winamp-channel-list" role="listbox" aria-label="Search results"></div>
      </div>
    </div>
  </aside>

  <p class="resume-note">Source: YouTube embed (no-cookie). Ads cannot be fully controlled by this site.</p>
</div>
