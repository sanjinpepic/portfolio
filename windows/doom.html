<div class="doom-shell">
  <div class="doom-toolbar" role="group" aria-label="DOOM controls">
    <a
      class="doom-open-new"
      href="https://silentspacemarine.com"
      target="_blank"
      rel="noopener noreferrer"
    >
      Open in new tab
    </a>
  </div>
  <iframe
    id="doom-frame"
    class="doom-frame"
    src="https://silentspacemarine.com"
    title="DOOM WASM"
    loading="lazy"
    allow="fullscreen; gamepad; keyboard-map"
    referrerpolicy="no-referrer"
  ></iframe>
  <p class="resume-note">
    Click inside the game window to capture keyboard controls.
  </p>
</div>
